<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11 培育系統</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#f472b6;--pink-light:#fce7f3;--pink-dark:#be185d;
  --gold:#f59e0b;--gold-light:#fef3c7;
  --green:#34d399;--green-light:#d1fae5;
  --bg:#fff9fb;--text:#1f1235;--muted:#6b7280;--border:#fce7f3;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:16px 16px 80px;}

.encourage-banner{background:linear-gradient(135deg,#fce7f3 0%,#ede9fe 60%,#dbeafe 100%);border-radius:20px;padding:16px 18px;margin-bottom:12px;border:1.5px solid #f9a8d4;position:relative;overflow:hidden;}
.encourage-banner::after{content:'💗';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:30px;opacity:0.18;}
.encourage-label{font-size:10px;font-weight:800;color:var(--pink-dark);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.encourage-text{font-size:13px;font-weight:700;color:#4c1d95;line-height:1.6;padding-right:34px;}

.header{background:white;border-radius:18px;padding:14px;margin-bottom:11px;border:1.5px solid var(--border);}
.baby-label{font-size:10px;font-weight:800;color:var(--pink-dark);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.baby-age{font-size:19px;font-weight:900;margin-bottom:1px;}
.baby-age span{color:var(--pink);}
.baby-sub{font-size:11px;color:var(--muted);margin-bottom:11px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.stat-card{background:var(--bg);border-radius:11px;padding:8px;text-align:center;border:1px solid rgba(244,114,182,0.15);}
.stat-icon{font-size:14px;margin-bottom:2px;}
.stat-val{font-size:14px;font-weight:900;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;}

.coin-bar{background:white;border-radius:15px;padding:11px 14px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--gold-light);}
.coin-left{display:flex;align-items:center;gap:9px;}
.coin-icon{font-size:22px;}
.coin-num{font-size:22px;font-weight:900;color:var(--gold);}
.coin-lbl{font-size:11px;color:var(--muted);font-weight:700;}
.redeem-btn{background:linear-gradient(135deg,#f59e0b,#f97316);color:white;border:none;border-radius:10px;padding:7px 13px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}

.nav-tabs{display:flex;background:white;border-radius:12px;padding:3px;gap:3px;margin-bottom:12px;border:1.5px solid var(--border);}
.nav-tab{flex:1;padding:7px 2px;border:none;border-radius:9px;background:transparent;font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;text-align:center;transition:all 0.2s;}
.nav-tab.active{background:linear-gradient(135deg,#fce7f3,#ede9fe);color:var(--pink-dark);}
.panel{display:none;}
.panel.active{display:block;}
.section-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:2px;}

.progress-section{background:white;border-radius:14px;padding:13px;margin-bottom:11px;border:1.5px solid var(--border);}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.progress-title{font-size:13px;font-weight:800;}
.progress-count{font-size:12px;color:var(--muted);font-weight:700;}
.progress-bar-bg{background:#f3f4f6;border-radius:999px;height:8px;overflow:hidden;margin-bottom:5px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#f472b6,#a78bfa);border-radius:999px;transition:width 0.4s;}
.progress-msg{font-size:11px;color:var(--muted);}

.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.task-card{background:white;border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:10px;border:1.5px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.2s;}
.task-card:hover{transform:translateY(-1px);border-color:var(--pink);}
.task-card.done{background:#f0fdf4;border-color:#86efac;}
.task-emoji{font-size:20px;width:38px;height:38px;background:var(--pink-light);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-card.done .task-emoji{background:var(--green-light);}
.task-info{flex:1;min-width:0;}
.task-name{font-size:13px;font-weight:800;margin-bottom:1px;}
.task-card.done .task-name{color:#16a34a;text-decoration:line-through;}
.task-desc{font-size:11px;color:var(--muted);line-height:1.35;}
.task-reward{display:flex;align-items:center;gap:3px;background:var(--gold-light);border-radius:8px;padding:4px 8px;font-size:12px;font-weight:900;color:#92400e;flex-shrink:0;}
.task-card.done .task-reward{background:var(--green-light);color:#166534;}
.check-circle{width:19px;height:19px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all 0.2s;}
.task-card.done .check-circle{background:#22c55e;border-color:#22c55e;color:white;}

.rep-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:linear-gradient(135deg,#fce7f3,#ede9fe);border:1.5px solid #f9a8d4;border-radius:10px;padding:5px 8px;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;transition:transform 0.12s;min-width:46px;}
.rep-btn:hover{transform:scale(1.07);}
.rep-btn:active{transform:scale(0.94);}
.rep-plus{font-size:15px;line-height:1;color:var(--pink-dark);font-weight:900;}
.rep-count{font-size:10px;font-weight:900;color:var(--pink-dark);}
.rep-tag{display:inline-flex;align-items:center;background:#fce7f3;border-radius:5px;padding:1px 5px;font-size:10px;font-weight:800;color:var(--pink-dark);margin-left:4px;}

/* REWARDS */
.reward-tier-bar{display:flex;gap:6px;margin-bottom:14px;}
.reward-tier-card{flex:1;background:white;border-radius:12px;padding:10px 8px;text-align:center;border:1.5px solid var(--border);}
.reward-tier-icon{font-size:18px;margin-bottom:3px;}
.reward-tier-name{font-size:10px;font-weight:800;color:var(--muted);}
.reward-tier-val{font-size:13px;font-weight:900;color:var(--text);}
.reward-tier-sub{font-size:10px;color:var(--muted);}
.reward-cat-header{font-size:13px;font-weight:900;margin:14px 0 8px;display:flex;align-items:center;gap:7px;}
.reward-cat-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
.rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.reward-card{background:white;border-radius:13px;padding:12px 10px;text-align:center;border:1.5px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.2s;position:relative;}
.reward-card:hover{transform:translateY(-2px);border-color:var(--gold);}
.reward-card.owned{border-color:#86efac;background:#f0fdf4;}
.reward-card.small-r{border-color:#fde68a;}
.reward-card.mid-r{border-color:#c4b5fd;}
.reward-card.big-r{border-color:#f9a8d4;}
.reward-emoji{font-size:25px;margin-bottom:4px;}
.reward-name{font-size:12px;font-weight:800;margin-bottom:5px;line-height:1.3;}
.reward-cost{display:inline-flex;align-items:center;gap:3px;background:var(--gold-light);border-radius:7px;padding:3px 7px;font-size:11px;font-weight:900;color:#92400e;}
.reward-card.owned .reward-cost{background:var(--green-light);color:#166534;}
.owned-badge{position:absolute;top:6px;right:6px;background:#22c55e;color:white;font-size:9px;font-weight:800;border-radius:5px;padding:2px 5px;}
.tier-label{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;border-radius:4px;padding:2px 5px;}
.tier-s{background:#fef9c3;color:#854d0e;}
.tier-m{background:#ede9fe;color:#4c1d95;}
.tier-l{background:#fce7f3;color:#be185d;}

/* LOG */
.log-section{background:white;border-radius:14px;padding:13px;margin-bottom:10px;border:1.5px solid var(--border);}
.log-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.log-icon{font-size:18px;}
.log-title{font-size:13px;font-weight:900;flex:1;}
.log-next{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--pink-light);color:var(--pink-dark);white-space:nowrap;}
.log-next.ok{background:var(--green-light);color:#166634;}
.log-empty{font-size:12px;color:var(--muted);text-align:center;padding:7px 0;}
.log-table{width:100%;border-collapse:collapse;}
.log-table th{font-size:10px;font-weight:800;color:var(--muted);text-align:left;padding:0 0 5px;border-bottom:1px solid var(--border);}
.log-table th:last-child{text-align:right;}
.log-table td{font-size:12px;padding:5px 0;border-bottom:1px solid #fdf2f8;}
.log-table tr:last-child td{border-bottom:none;}
.log-table td:last-child{text-align:right;}
.log-idx{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--pink-light);color:var(--pink-dark);border-radius:50%;font-size:9px;font-weight:900;}
.log-time{font-weight:800;}
.log-ago{font-size:11px;color:var(--muted);}

/* MILESTONE */
.milestone-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.milestone-row:last-child{border-bottom:none;}
.milestone-dot{width:10px;height:10px;border-radius:50%;background:#d1d5db;flex-shrink:0;}
.milestone-dot.passed{background:var(--green);}
.milestone-dot.current{background:var(--pink);box-shadow:0 0 0 4px rgba(244,114,182,0.25);}
.milestone-info{flex:1;}
.milestone-name{font-size:13px;font-weight:800;}
.milestone-age{font-size:11px;color:var(--muted);}
.milestone-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--pink-light);color:var(--pink-dark);flex-shrink:0;}
.milestone-badge.passed{background:var(--green-light);color:#166534;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1f1235;color:white;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;opacity:0;transition:transform 0.3s,opacity 0.3s;z-index:100;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.coin-anim{position:fixed;pointer-events:none;font-size:19px;z-index:200;animation:floatUp 1s forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
</style>
</head>
<body>
<div class="app">

  <div class="encourage-banner">
    <div class="encourage-label">今日給媽咪的話 💌</div>
    <div class="encourage-text" id="encourageText">載入中...</div>
  </div>

  <div class="header">
    <div class="baby-label">11 培育系統</div>

    <div class="baby-sub">出生日期：2025年11月9日</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val" id="daysOld">-</div><div class="stat-lbl">天數</div></div>
      <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val" id="streakCount">0</div><div class="stat-lbl">連續天</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-val" id="totalDone">0</div><div class="stat-lbl">已完成</div></div>
    </div>
  </div>

  <div class="coin-bar">
    <div class="coin-left">
      <div class="coin-icon">🪙</div>
      <div><div class="coin-num" id="coinDisplay">0</div><div class="coin-lbl">金幣</div></div>
    </div>
    <button id="vaultBtn" class="redeem-btn" onclick="(state.vault&&state.vault.length>0)?switchTab('vault'):switchTab('rewards')">兌換獎勵 ✨</button>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('tasks')">📋 任務</button>

    <button class="nav-tab" onclick="switchTab('rewards')">🎁 獎勵</button>

    <button class="nav-tab" onclick="switchTab('milestone')">🌱 里程</button>

  <div class="panel active" id="panel-tasks">

      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-msg" id="progressMsg">完成任務獲得金幣吧！</div>
    </div>
    <div class="section-title">每日任務</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <div class="panel" id="panel-log"><div id="logContent"></div></div>
  <div class="panel" id="panel-rewards"><div id="rewardsContent"></div></div>
  <div class="panel" id="panel-vault">
    <div class="section-title">媽咪寶庫 💜</div>
    <div id="vaultContent"></div>
  </div>
  <div class="panel" id="panel-milestone">
    <div class="section-title">成長里程碑</div>
    <div id="milestoneList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

function getDailyEncouragement() {
  const day = Math.floor((TODAY - BIRTH) / 86400000);
  const idx = ((day % ENCOURAGEMENTS.length) + ENCOURAGEMENTS.length) % ENCOURAGEMENTS.length;
  return ENCOURAGEMENTS[idx];
}

// AGE
// ══════════════════════════════════════════
function getAgeInfo() {
  const diffMs = TODAY - BIRTH;
  const diffDays = Math.floor(diffMs / 86400000);
  const diffMonths = (TODAY.getFullYear()-BIRTH.getFullYear())*12+(TODAY.getMonth()-BIRTH.getMonth());
  const diffYears = TODAY.getFullYear()-BIRTH.getFullYear();
  const adjYears = (TODAY<new Date(TODAY.getFullYear(),BIRTH.getMonth(),BIRTH.getDate()))?diffYears-1:diffYears;
  const adjMonths = Math.max(0,diffMonths);
  let ageText,stage,stageKey;
  if(diffDays<0){ageText=`還有 ${-diffDays} 天出生`;stage='等待中 🌸';stageKey='prenatal';}
  else if(diffDays<=30){ageText=diffDays===0?'今天出生！':`出生第 ${diffDays} 天`;stage='新生兒期 🍼';stageKey='newborn';}
  else if(adjMonths<6){ageText=`${adjMonths} 個月大`;stage='嬰兒前期 👶';stageKey='infant_early';}
  else if(adjMonths<12){ageText=`${adjMonths} 個月大`;stage='嬰兒後期 🌟';stageKey='infant_late';}
  else if(adjYears<2){const m=adjMonths-12;ageText=`1 歲${m>0?' '+m+' 個月':''}`;stage='學步兒 🐣';stageKey='toddler_1';}
  else if(adjYears<3){ageText='2 歲';stage='幼兒期 🌈';stageKey='toddler_2';}
  else{ageText=`${adjYears} 歲`;stage='兒童期 🧒';stageKey='child';}
  return{diffDays,adjMonths,adjYears,ageText,stage,stageKey};
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
function getStorage() {
  try {
    const d=JSON.parse(localStorage.getItem('baby11_v3')||'{}');
    return{coins:d.coins||0,doneTasks:d.doneTasks||{},sleepCounts:d.sleepCounts||{},timeLogs:d.timeLogs||{},ownedRewards:d.ownedRewards||[],vault:d.vault||[],streak:d.streak||0,lastDate:d.lastDate||'',totalDone:d.totalDone||0};
  } catch{return{coins:0,doneTasks:{},sleepCounts:{},timeLogs:{},ownedRewards:[],vault:[],streak:0,lastDate:'',totalDone:0};}
}
function saveStorage(d){try{localStorage.setItem('baby11_v3',JSON.stringify(d));}catch{}}

let state=getStorage();
const info=getAgeInfo();
const todayKey=TODAY.toISOString().slice(0,10);

// 清除舊的 localStorage 版本
['baby11_data','baby11_v2'].forEach(k=>localStorage.removeItem(k));

// 每天重置任務紀錄（sleepCounts 和 timeLogs 只保留今天）
if(!state.doneTasks[todayKey])state.doneTasks[todayKey]=[];
if(!state.sleepCounts[todayKey])state.sleepCounts[todayKey]={};
// 清除非今天的 sleepCounts
Object.keys(state.sleepCounts).forEach(k=>{if(k!==todayKey)delete state.sleepCounts[k];});
// timeLogs 只保留今天的記錄
if(state.timeLogs){
  Object.keys(state.timeLogs).forEach(logKey=>{
    state.timeLogs[logKey]=(state.timeLogs[logKey]||[]).filter(ts=>ts.slice(0,10)===todayKey);
  });
}
saveStorage(state);

function getTasks(){return TASK_DB[info.stageKey]||TASK_DB['newborn'];}
function getRegularTasks(){return getTasks().filter(t=>!t.repeatable);}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  document.getElementById('encourageText').textContent=getDailyEncouragement();
  const tasks=getTasks(),reg=getRegularTasks(),done=state.doneTasks[todayKey]||[];
  document.getElementById('ageDisplay').innerHTML=`<span>${info.ageText}</span>　${info.stage}`;
  document.getElementById('daysOld').textContent=Math.max(0,info.diffDays);
  document.getElementById('streakCount').textContent=state.streak||0;
  document.getElementById('totalDone').textContent=state.totalDone||0;
  document.getElementById('coinDisplay').textContent=state.coins;
  const vaultCount=(state.vault||[]).length;
  document.getElementById('vaultBtn').textContent=vaultCount>0?`媽咪寶庫 💜 ${vaultCount}`:'兌換獎勵 ✨';

  const doneReg=done.filter(id=>reg.find(t=>t.id===id));
  const pct=reg.length>0?Math.round(doneReg.length/reg.length*100):0;
  document.getElementById('progressCount').textContent=`${doneReg.length}/${reg.length}`;
  document.getElementById('progressFill').style.width=pct+'%';
  const msgs=['完成任務獲得金幣吧！','繼續加油！','快完成了！','今日任務全部完成！太棒了！🎉'];
  document.getElementById('progressMsg').textContent=msgs[pct===0?0:pct<50?1:pct<100?2:3];

  document.getElementById('taskList').innerHTML=tasks.map(t=>{
    const isDone=done.includes(t.id);
    if(t.repeatable){
      const cnt=(state.sleepCounts[todayKey]&&state.sleepCounts[todayKey][t.id])||0;
      return `<div class="task-card" style="border-color:#f9a8d4;">
        <div class="task-emoji">${t.emoji}</div>
        <div class="task-info">
          <div class="task-name">${t.name}<span class="rep-tag">每次有獎</span></div>
          <div class="task-desc">${t.desc}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <div class="task-reward">🪙${t.reward}</div>
          <button class="rep-btn" onclick="addRep('${t.id}',${t.reward},'${t.logKey||''}')">
            <span class="rep-plus">+</span>
            <span class="rep-count">${cnt>0?cnt+'次':'記錄'}</span>
          </button>
        </div>
      </div>`;
    }
    return `<div class="task-card ${isDone?'done':''}" onclick="toggleTask('${t.id}',${t.reward})">
      <div class="task-emoji">${t.emoji}</div>
      <div class="task-info"><div class="task-name">${t.name}</div><div class="task-desc">${t.desc}</div></div>
      <div class="task-reward">🪙${t.reward}</div>
      <div class="check-circle">${isDone?'✓':''}</div>
    </div>`;
  }).join('');

  // 獎勵面板（可重複兌換，不顯示已兌換狀態）
  let rhtml='';
  REWARD_CATS.forEach(cat=>{
    rhtml+=`<div class="reward-cat-header">${cat.icon} ${cat.label} <span class="reward-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.items.length}項</span></div><div class="rewards-grid">`;
    rhtml+=cat.items.map(r=>{
      return `<div class="reward-card" onclick="redeemReward('${r.id}',${r.cost},'${r.name}')">
        <div class="reward-emoji">${r.emoji}</div>
        <div class="reward-name">${r.name}</div>
        <div class="reward-cost">🪙 ${r.cost}</div>
      </div>`;
    }).join('');
    rhtml+='</div>';
  });
  document.getElementById('rewardsContent').innerHTML=rhtml;

  // 寶庫面板
  renderVault();

  document.getElementById('milestoneList').innerHTML=MILESTONES.map(m=>{
    const passed=info.adjMonths>m.ageMonths,current=info.adjMonths===m.ageMonths;
    return `<div class="milestone-row">
      <div class="milestone-dot ${passed?'passed':current?'current':''}"></div>
      <div class="milestone-info"><div class="milestone-name">${m.emoji} ${m.name}</div><div class="milestone-age">${m.ageMonths===0?'出生時':m.ageMonths<12?`約 ${m.ageMonths} 個月`:`約 ${Math.floor(m.ageMonths/12)} 歲`}</div></div>
      <div class="milestone-badge ${passed?'passed':''}">${passed?'已達成':current?'現在':'期待中'}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function toggleTask(id,reward){
  const done=state.doneTasks[todayKey],idx=done.indexOf(id);
  if(idx===-1){done.push(id);state.coins+=reward;state.totalDone=(state.totalDone||0)+1;showCoinAnim(reward);showToast(`+${reward} 金幣！很棒！🎉`);}
  else{done.splice(idx,1);state.coins=Math.max(0,state.coins-reward);showToast('取消完成');}
  saveStorage(state);render();
}

function addRep(id,reward,logKey){
  if(!state.sleepCounts[todayKey])state.sleepCounts[todayKey]={};
  if(!state.timeLogs)state.timeLogs={};
  const key=logKey||id;
  if(!state.timeLogs[key])state.timeLogs[key]=[];
  state.timeLogs[key].unshift(new Date().toISOString());
  if(state.timeLogs[key].length>50)state.timeLogs[key]=state.timeLogs[key].slice(0,50);
  state.sleepCounts[todayKey][id]=(state.sleepCounts[todayKey][id]||0)+1;
  state.coins+=reward;state.totalDone=(state.totalDone||0)+1;
  saveStorage(state);render();showCoinAnim(reward);
  const cnt=state.sleepCounts[todayKey][id];
  const toasts={milk:`餵奶第${cnt}次！+${reward}金幣 🍼`,solid:`副食品第${cnt}次！+${reward}金幣 🥣`,sleep:`哄睡第${cnt}次！+${reward}金幣 😴✨`};
  showToast(toasts[logKey]||`+${reward}金幣！第${cnt}次 🎉`);
}

function redeemReward(id,cost,name,icon){
  if(!state.vault)state.vault=[];
  if(state.coins<cost){showToast(`金幣不足！還需要 ${cost-state.coins} 枚 🪙`);return;}
  // find emoji from reward cats
  let emoji='🎁';
  REWARD_CATS.forEach(cat=>cat.items.forEach(r=>{if(r.id===id)emoji=r.emoji;}));
  const vKey=id+'_'+Date.now();
  state.coins-=cost;
  state.vault.push({vKey,id,name,emoji,redeemedAt:new Date().toISOString()});
  saveStorage(state);render();renderVault();
  showToast(`已放入媽咪寶庫：${name} 💜`);
}

function useVaultItem(vKey){
  if(!state.vault)state.vault=[];
  const idx=state.vault.findIndex(v=>v.vKey===vKey);
  if(idx===-1)return;
  const item=state.vault[idx];
  state.vault.splice(idx,1);
  saveStorage(state);render();renderVault();
  showToast(`已使用：${item.name} ✅`);
}

function renderVault(){
  if(!state.vault)state.vault=[];
  const el=document.getElementById('vaultContent');
  if(!el)return;
  if(state.vault.length===0){
    el.innerHTML=`<div style="text-align:center;padding:32px 0;">
      <div style="font-size:40px;margin-bottom:12px;">💜</div>
      <div style="font-size:14px;font-weight:800;color:var(--muted)">寶庫是空的</div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px">去獎勵商店兌換後，<br>獎勵會放在這裡等你使用</div>
    </div>`;
    return;
  }
  el.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--muted);font-weight:700;">點擊「使用」代表已享受，從寶庫移除 ✨</div>`+
  state.vault.map(item=>{
    const d=new Date(item.redeemedAt);
    const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    return `<div style="background:white;border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;border:1.5px solid #e9d5ff;margin-bottom:8px;">
      <div style="font-size:26px;width:42px;height:42px;background:#ede9fe;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${item.emoji}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:800;margin-bottom:2px;">${item.name}</div>
        <div style="font-size:11px;color:var(--muted)">兌換於 ${dateStr}</div>
      </div>
      <button onclick="useVaultItem('${item.vKey}')" style="background:linear-gradient(135deg,#a78bfa,#f472b6);color:white;border:none;border-radius:9px;padding:7px 13px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;">使用 ✓</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// LOG
// ══════════════════════════════════════════
function fmt2(n){return String(n).padStart(2,'0');}
function fmtTime(iso){const d=new Date(iso);return`${fmt2(d.getHours())}:${fmt2(d.getMinutes())}`;}
function fmtDate(iso){const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()}`;}
function todayStr(){return fmtDate(new Date().toISOString());}
function timeAgo(iso){
  const diff=Math.floor((Date.now()-new Date(iso))/60000);
  if(diff<1)return'剛剛';if(diff<60)return`${diff}分前`;
  const h=Math.floor(diff/60),m=diff%60;return m>0?`${h}h${m}m前`:`${h}小時前`;
}
function nextTimeStr(iso,mins){
  const d=new Date(new Date(iso).getTime()+mins*60000);
  return`${fmt2(d.getHours())}:${fmt2(d.getMinutes())}`;
}

function renderLogSection(title,icon,logKey,intervalMins){
  if(!state.timeLogs)state.timeLogs={};
  const logs=state.timeLogs[logKey]||[];
  const latest=logs[0];
  let nextHtml='';
  if(latest&&intervalMins){
    const minSince=Math.floor((Date.now()-new Date(latest))/60000);
    const left=intervalMins-minSince;
    if(left<=0){nextHtml=`<span class="log-next ok">現在可以餵囉</span>`;}
    else{nextHtml=`<span class="log-next">下次建議 ${nextTimeStr(latest,intervalMins)}</span>`;}
  }
  const rows=logs.slice(0,12).map((ts,i)=>{
    const isToday=fmtDate(ts)===todayStr();
    return`<tr><td><span class="log-idx">${i+1}</span></td><td><span class="log-time">${fmtTime(ts)}</span> <span style="font-size:10px;color:var(--muted)">${isToday?'今天':fmtDate(ts)}</span></td><td><span class="log-ago">${timeAgo(ts)}</span></td></tr>`;
  }).join('');
  return`<div class="log-section">
    <div class="log-head"><span class="log-icon">${icon}</span><span class="log-title">${title}</span>${nextHtml}</div>
    ${logs.length===0
      ?`<div class="log-empty">還沒有紀錄，按任務的 + 開始記錄</div>`
      :`<table class="log-table"><thead><tr><th>#</th><th>時間</th><th style="text-align:right">距現在</th></tr></thead><tbody>${rows}</tbody></table>`}
  </div>`;
}

function renderLog(){
  document.getElementById('logContent').innerHTML=
    renderLogSection('餵11吃奶奶','🍼','milk',180)+
    renderLogSection('餵11吃副食品','🥣','solid',null)+
    renderLogSection('哄睡紀錄','😴','sleep',null);
}

function switchTab(tab){
  const tabs=['tasks','log','rewards','vault','milestone'];
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
  if(tab==='log')renderLog();
  if(tab==='vault')renderVault();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function showCoinAnim(amount){
  const el=document.createElement('div');
  el.className='coin-anim';el.textContent=`🪙+${amount}`;
  el.style.left=(Math.random()*60+20)+'%';el.style.bottom='80px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}

render();
renderVault();
</script>
